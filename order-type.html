<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Type | BurgerGOOD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/bootstrap.css" />
    <link rel="stylesheet" href="assets/styles.css" />
    <link rel="stylesheet" href="assets/bootstrap-icons/bootstrap-icons.css" />
    <link rel="icon" href="public/logo.png" />
  </head>
  <body class="bg-cream">
    <main
      class="w-100 h-auto gap-2 my-4 d-flex flex-column justify-content-center align-items-center"
    >
      <div class="w-50 h-50 d-flex justify-content-center align-items-center">
        <img
          src="public/logo.png"
          alt=""
          class="object-fit-contain w-25 h-25"
        />
      </div>
      <h1 class="fredoka-font-bold big-font text-center">
        Welcome To BurgerGOOD
      </h1>
      <p class="fs-5 fredoka-font">Choose Your Order Type</p>
      <div
        class="d-flex flex-column flex-lg-row justify-content-center align-items-center gap-4"
      >
        <div class="card text-center h-50 border-0 shadow-lg">
          <div class="card-body">
            <h5
              class="card-title fredoka-font-medium d-flex gap-2 justify-content-center align-items-center"
            >
              Dine In <i class="bi bi-fork-knife"></i>
            </h5>
            <p class="card-text">
              Enjoy your meal in our restaurant with a comfortable dining
              experience.
            </p>
            <a href="menu.html" class="btn bg-gold w-100 fredoka-font"
              >Start Dine In Order</a
            >
          </div>
        </div>

        <div class="card text-center h-50 border-0 shadow-lg">
          <div class="card-body">
            <h5
              class="card-title fredoka-font-medium d-flex gap-2 justify-content-center align-items-center"
            >
              Take Away <i class="bi bi-box-seam"></i>
            </h5>
            <p class="card-text">
              Order now and take your food with you quickly and easily.
            </p>
            <a href="#" class="btn bg-gold w-100 fredoka-font"
              >Start Take Away Order</a
            >
          </div>
        </div>
      </div>

      <a href="index.html" class="my-4 text-dark link-dark link-offset-2 link-underline-opacity-50 link-underline-opacity-100-hover">Back to home</a>
    </main>

    <script src="assets/js/bootstrap.js"></script>
  </body>
</html>
